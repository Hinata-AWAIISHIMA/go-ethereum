name: Apple Build Verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apple-builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOBIN: ${{ github.workspace }}/build/bin

jobs:
  darwin-arm64-make-all:
    name: make all (darwin/arm64)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'
          cache: true

      - name: Show toolchain
        run: |
          set -euxo pipefail
          uname -a
          go version
          go env GOOS GOARCH

      - name: Verify make all
        run: |
          set -euxo pipefail
          make all

  ios-make-ios:
    name: make ios
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go for gomobile
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'
          cache: true

      - name: Show Apple toolchain
        run: |
          set -euxo pipefail
          uname -a
          xcodebuild -version
          go version
          go env GOOS GOARCH

      - name: Verify make ios
        run: |
          set -euxo pipefail
          make ios
          test -d build/bin/Geth.xcframework

  ios-explicit-arm64-targets:
    name: gomobile bind -> xcframework (ios/arm64, iossimulator/arm64)
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go for gomobile
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'
          cache: true

      - name: Show Apple toolchain
        run: |
          set -euxo pipefail
          uname -a
          xcodebuild -version
          go version
          go env GOOS GOARCH

      - name: Install gomobile
        run: |
          set -euxo pipefail
          mkdir -p "$GOBIN"
          env GO111MODULE=on GOBIN="$GOBIN" go install golang.org/x/mobile/cmd/gomobile@latest golang.org/x/mobile/cmd/gobind@latest
          "$GOBIN/gomobile" version

      - name: Download Go modules
        run: |
          set -euxo pipefail
          go mod download

      - name: Build ios/arm64 intermediate framework
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/ios-arm64"
          PATH="$GOBIN:$PATH" GOBIN="$GOBIN" "$GOBIN/gomobile" bind \
            -ldflags "-s -w" \
            --target ios/arm64 \
            -v \
            -o "$RUNNER_TEMP/ios-arm64/Geth.framework" \
            github.com/ethereum/go-ethereum/mobile
          test -d "$RUNNER_TEMP/ios-arm64/Geth.framework"

      - name: Build iossimulator/arm64 intermediate framework
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/iossimulator-arm64"
          PATH="$GOBIN:$PATH" GOBIN="$GOBIN" "$GOBIN/gomobile" bind \
            -tags iossimulator \
            -ldflags "-s -w" \
            --target iossimulator/arm64 \
            -v \
            -o "$RUNNER_TEMP/iossimulator-arm64/Geth.framework" \
            github.com/ethereum/go-ethereum/mobile
          test -d "$RUNNER_TEMP/iossimulator-arm64/Geth.framework"

      - name: Create final xcframework
        run: |
          set -euxo pipefail
          rm -rf build/bin/Geth.xcframework
          xcodebuild -create-xcframework \
            -framework "$RUNNER_TEMP/ios-arm64/Geth.framework" \
            -framework "$RUNNER_TEMP/iossimulator-arm64/Geth.framework" \
            -output build/bin/Geth.xcframework
          test -d build/bin/Geth.xcframework
