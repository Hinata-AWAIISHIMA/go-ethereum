name: Apple Build Verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apple-builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOBIN: ${{ github.workspace }}/build/bin

jobs:
  darwin-arm64-make-all:
    name: make all equivalent (darwin/arm64)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'
          cache: true

      - name: Show toolchain
        run: |
          set -euxo pipefail
          uname -a
          go version
          go env GOOS GOARCH

      - name: Verify make all equivalent command
        run: |
          set -euxo pipefail
          env GO111MODULE=on GOFLAGS='-x -work' go run build/ci.go install 2>&1 | tee "$RUNNER_TEMP/make-all.log"
          grep -E "libel_stack\\.a|el_stack/libs" "$RUNNER_TEMP/make-all.log"

  ios-make-ios:
    name: make ios equivalent
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go for gomobile
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'
          cache: true

      - name: Show Apple toolchain
        run: |
          set -euxo pipefail
          uname -a
          xcodebuild -version
          go version
          go env GOOS GOARCH

      - name: Install gomobile and gobind
        run: |
          set -euxo pipefail
          mkdir -p "$GOBIN"
          env GO111MODULE=on GOBIN="$GOBIN" go install golang.org/x/mobile/cmd/gomobile@latest golang.org/x/mobile/cmd/gobind@latest
          "$GOBIN/gomobile" version

      - name: Verify make ios equivalent command
        run: |
          set -euxo pipefail
          PATH="$GOBIN:$PATH" GOBIN="$GOBIN" "$GOBIN/gomobile" bind \
            -x \
            -work \
            -ldflags "-s -w" \
            --target ios \
            -v \
            -o build/bin/Geth.xcframework \
            github.com/ethereum/go-ethereum/mobile 2>&1 | tee "$RUNNER_TEMP/make-ios.log"
          test -d build/bin/Geth.xcframework
          grep -E "libel_stack\\.a|el_stack/libs" "$RUNNER_TEMP/make-ios.log"

  ios-explicit-arm64-targets:
    name: gomobile bind -> xcframework (ios/arm64, iossimulator/arm64)
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go for gomobile
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.0'
          cache: true

      - name: Show Apple toolchain
        run: |
          set -euxo pipefail
          uname -a
          xcodebuild -version
          go version
          go env GOOS GOARCH

      - name: Install gomobile
        run: |
          set -euxo pipefail
          mkdir -p "$GOBIN"
          env GO111MODULE=on GOBIN="$GOBIN" go install golang.org/x/mobile/cmd/gomobile@latest golang.org/x/mobile/cmd/gobind@latest
          "$GOBIN/gomobile" version

      - name: Download Go modules
        run: |
          set -euxo pipefail
          go mod download

      - name: Build ios/arm64 intermediate xcframework
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/ios-arm64"
          PATH="$GOBIN:$PATH" GOBIN="$GOBIN" "$GOBIN/gomobile" bind \
            -x \
            -work \
            -ldflags "-s -w" \
            --target ios/arm64 \
            -v \
            -o "$RUNNER_TEMP/ios-arm64/Geth.xcframework" \
            github.com/ethereum/go-ethereum/mobile 2>&1 | tee "$RUNNER_TEMP/ios-arm64-bind.log"
          test -d "$RUNNER_TEMP/ios-arm64/Geth.xcframework"
          grep -E "libel_stack\\.a|el_stack/libs" "$RUNNER_TEMP/ios-arm64-bind.log"

      - name: Build iossimulator/arm64 intermediate xcframework
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/iossimulator-arm64"
          PATH="$GOBIN:$PATH" GOBIN="$GOBIN" "$GOBIN/gomobile" bind \
            -x \
            -work \
            -tags iossimulator \
            -ldflags "-s -w" \
            --target iossimulator/arm64 \
            -v \
            -o "$RUNNER_TEMP/iossimulator-arm64/Geth.xcframework" \
            github.com/ethereum/go-ethereum/mobile 2>&1 | tee "$RUNNER_TEMP/iossimulator-arm64-bind.log"
          test -d "$RUNNER_TEMP/iossimulator-arm64/Geth.xcframework"
          grep -E "libel_stack\\.a|el_stack/libs" "$RUNNER_TEMP/iossimulator-arm64-bind.log"

      - name: Create final xcframework
        run: |
          set -euxo pipefail
          ios_framework="$(find "$RUNNER_TEMP/ios-arm64/Geth.xcframework" -type d -name Geth.framework -print -quit)"
          simulator_framework="$(find "$RUNNER_TEMP/iossimulator-arm64/Geth.xcframework" -type d -name Geth.framework -print -quit)"
          test -n "$ios_framework"
          test -n "$simulator_framework"
          rm -rf build/bin/Geth.xcframework
          xcodebuild -create-xcframework \
            -framework "$ios_framework" \
            -framework "$simulator_framework" \
            -output build/bin/Geth.xcframework
          test -d build/bin/Geth.xcframework
